<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Секретная страница</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #e83e8c;
      --text: #333;
      --card: #fff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 1.8rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h2 {
      margin-bottom: 1rem;
      color: var(--accent);
      font-size: 1.35rem;
      line-height: 1.3;
    }

    .instruction {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 1.2rem;
      padding: 0 8px;
    }

    .shifr-image {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 8px;
      margin: 1.2rem auto;
      display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .text-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px; /* Важно для iOS — предотвращает зум */
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: all 0.2s;
      background: #fff;
      margin: 1.2rem 0;
      text-align: center;
      -webkit-appearance: none;
    }
    .text-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 62, 140, 0.15);
    }

    button {
      padding: 14px 32px;
      font-size: 16px; /* Важно для iOS */
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      width: 100%;
      max-width: 280px;
      -webkit-appearance: none;
    }
    button:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .error {
      color: #d93025;
      margin-top: 12px;
      display: none;
      font-size: 14px;
      min-height: 20px;
      padding: 0 8px;
    }

    .input-section.hidden { display: none; }

    /* Оптимизация для iPhone */
    @supports (-webkit-touch-callout: none) {
      .text-input, button {
        font-size: 16px;
      }
    }

    @media (max-width: 380px) {
      .container {
        padding: 1.4rem 0.8rem;
      }
      h2 {
        font-size: 1.25rem;
      }
      .instruction {
        font-size: 15px;
      }
      .shifr-image {
        max-width: 260px;
      }
    }

    @media (max-height: 700px) {
      .container {
        padding: 1.2rem 1rem;
      }
      .instruction {
        margin-bottom: 0.8rem;
        font-size: 15px;
      }
      .shifr-image {
        margin: 0.8rem auto;
        max-width: 240px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="pageHeader">🔐 Зашифрованная фраза</h2>

    <div class="input-section" id="inputSection">
      <p class="instruction">
        Перед тобой фраза, зашифрованная шифром Цезаря. Для того чтобы пройти на следующий этап — тебе нужно ее отгадать и записать в поле ниже.
          <br>Для расшифровки - сдвинь каждую букву на 1 НАЗАД, например: П = О, БВГ = АБВ
          <br><br>
          <strong>пшёоэ мявмя й тлфшбя, тлпсп рсйёеф</strong>
      </p>



      <input
        type="text"
        class="text-input"
        id="phraseInput"
        placeholder="Введи отгаданную фразу здесь..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >

      <button onclick="checkPhrase()">Открыть</button>
      <p class="error" id="errorMsg"></p>
    </div>
  </div>

  <script>
    const CORRECT_PHRASE = 'я тебя очень сильно люблю и безумно скучаю';

    const phraseInput = document.getElementById('phraseInput');
    const errorMsg = document.getElementById('errorMsg');

    function resetError() {
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }

    phraseInput.addEventListener('input', resetError);

    phraseInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkPhrase();
    });

    function checkPhrase() {
      const input = phraseInput.value.trim().toLowerCase();
      const correct = CORRECT_PHRASE.toLowerCase();

      if (!input) {
        errorMsg.textContent = '💭 Подсказка: попробуй посмотреть под другим углом...';
        errorMsg.style.display = 'block';
        return;
      }

      if (input === correct) {
        window.location.href = 'scratch.html';
      } else {
        errorMsg.textContent = '💭 Подсказка: попробуй посмотреть под другим углом... 💔';
        errorMsg.style.display = 'block';

        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

        phraseInput.value = '';
        phraseInput.focus();
      }
    }

    // Автофокус с задержкой для iOS
    window.addEventListener('load', () => {
      setTimeout(() => {
        phraseInput.focus();
      }, 300);
    });

    // Предотвращение зума на двойной тап для iOS
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>
