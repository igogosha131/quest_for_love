<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секретная страница</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #e83e8c;
      --text: #333;
      --card: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Фон — как везде */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 1.8rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h2 { margin-bottom: 1.2rem; color: var(--accent); font-size: 1.35rem; }

    .code-inputs {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .code-inputs input {
      width: 38px;
      height: 46px;
      font-size: 22px;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: all 0.2s;
      background: #fff;
      flex-shrink: 0;
    }
    .code-inputs input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 62, 140, 0.15);
    }
    .code-inputs input.filled {
      border-color: #aaa;
      background: #f1f3f4;
    }

    button {
      padding: 12px 28px;
      font-size: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }

    #result { margin-top: 1.5rem; display: none; }
    #result img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .error {
      color: #d93025;
      margin-top: 10px;
      display: none;
      font-size: 14px;
      min-height: 20px;
    }
    .hint {
      margin-top: 1rem;
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .input-section.hidden { display: none; }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 340px) {
      .container { padding: 1.4rem 0.8rem; }
      .code-inputs input { width: 34px; height: 42px; font-size: 20px; }
      h2 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="pageHeader">🔐 Введи код доступа</h2>

    <div class="input-section" id="inputSection">
      <div class="code-inputs">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="0" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="1" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="2" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="3" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="4" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="5" autocomplete="one-time-code">
      </div>
      <button onclick="checkCode()">Открыть</button>
      <p class="error" id="errorMsg"></p>
    </div>

    <div id="result">
      <img src="img/secret-photo.jpg" alt="Секретное фото">
      <p class="hint" style="margin-top: 12px;">Следующая подсказка - около места, где сделано это фото ❤️</p>
    </div>
  </div>

  <script>
    const CORRECT_CODE = '200820'; // ← ЗАМЕНИ НА СВОЙ КОД

    const digits = document.querySelectorAll('.digit');
    const errorMsg = document.getElementById('errorMsg');

    function resetError() {
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }

    digits.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val && index < digits.length - 1) digits[index + 1].focus();
        e.target.classList.toggle('filled', !!val);
        resetError();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) digits[index - 1].focus();
        if (e.key === 'ArrowLeft' && index > 0) digits[index - 1].focus();
        if (e.key === 'ArrowRight' && index < digits.length - 1) digits[index + 1].focus();
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        if (paste.length === 6) {
          paste.split('').forEach((char, i) => { if (digits[i]) digits[i].value = char; });
          digits[5].focus();
          resetError();
        }
      });
    });

    digits[5].addEventListener('keypress', (e) => { if (e.key === 'Enter') checkCode(); });

    function getCode() {
      return Array.from(digits).map(inp => inp.value).join('');
    }

    function checkCode() {
      const input = getCode();
      const result = document.getElementById('result');
      const inputSection = document.getElementById('inputSection');
      const header = document.getElementById('pageHeader');

      if (input.length < 6) {
        errorMsg.textContent = 'Введи все 6 цифр 🔢';
        errorMsg.style.display = 'block';
        return;
      }

      if (input === CORRECT_CODE) {
        inputSection.classList.add('hidden');
        header.style.display = 'none';
        errorMsg.style.display = 'none';
        result.style.display = 'block';
      } else {
        errorMsg.textContent = 'Неверный код. Попробуй ещё раз 💔';
        errorMsg.style.display = 'block';

        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

        digits.forEach(inp => {
          inp.value = '';
          inp.classList.remove('filled');
        });
        digits[0].focus();
      }
    }

    window.addEventListener('load', () => digits[0].focus());
  </script>
</body>
</html>
