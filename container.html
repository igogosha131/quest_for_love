<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секретная страница</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 1.2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 560px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease;
    }

    .container img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 420px) {
      .container { padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="img/container.jpg" alt="Фотография">
      <p>
          Тебе нужно найти этот чемодан в мастерской
        <br><br>
        P.S. открывай и доставай его аккуратно, не переворачивай! ❤️
      </p>
  </div>
</body>
</html>
